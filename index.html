<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق إدارة الخبز</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- شاشة إعداد الجدول الجديد -->
        <section id="setup-section" class="card hidden">
            <h2>إعداد جدول جديد</h2>
            <p id="setup-hint" class="text-muted" style="margin-bottom: 15px; font-size: 14px;"></p>
            <div class="input-group">
                <label>تاريخ البداية:</label>
                <input type="date" id="start-date">
            </div>
            <!-- تمت إزالة تاريخ النهاية من هنا -->
            <div class="input-group">
                <label>العدد الكلي للخبز للشهر/للفترة:</label>
                <input type="number" id="total-bread-input" placeholder="مثال: 350">
            </div>
            <button class="btn btn-primary" onclick="createNewSchedule()">بدء الجدول</button>
            <button class="btn btn-secondary full-width" onclick="toggleHistorySection()" style="margin-top: 10px;">عرض المشتريات السابقة</button>
        </section>

        <!-- الواجهة الرئيسية للتطبيق -->
        <section id="main-dashboard" class="hidden">
            <header class="header-date">
                <h1 id="today-day-name">اليوم</h1>
                <p id="today-full-date">التاريخ</p>
            </header>

            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-label">المتبقي</span>
                    <span class="stat-value" id="remaining-bread">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">العدد الكلي</span>
                    <span class="stat-value text-blue" id="total-bread">0</span>
                </div>
            </div>

            <div class="card status-card">
                <div class="toggle-row">
                    <span class="toggle-label" id="money-label">فلوس الاشتراك (غير واصل)</span>
                    <label class="switch">
                        <input type="checkbox" id="money-toggle" onchange="updateSubscription()">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="divider"></div>
                <div class="toggle-row">
                    <span class="toggle-label" id="flour-label">الطحين (غير واصل)</span>
                    <label class="switch">
                        <input type="checkbox" id="flour-toggle" onchange="updateSubscription()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div id="missing-days-warning" class="warning-banner hidden">
                ⚠️ تنبيه: أنت تقوم الآن بتسجيل يوم فائت!
            </div>

            <div class="card action-card">
                <h3 id="record-card-title">تسجيل الخبز ليوم</h3>
                <div class="input-row">
                    <input type="number" id="daily-amount" placeholder="عدد الخبز">
                    <select id="daily-meal">
                        <option value="غداء">غداء</option>
                        <option value="عشاء">عشاء</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="recordToday(true)">تسجيل العدد</button>
                    <button class="btn btn-warning" onclick="recordToday(false)">لم أشتري (فارغ)</button>
                </div>
            </div>

            <button class="btn btn-secondary full-width" onclick="toggleTable()">عرض وتعديل الجدول الحالي</button>
            <button class="btn btn-primary full-width" onclick="toggleHistorySection()" style="margin-top: 10px; background-color: var(--apple-blue);">عرض المشتريات السابقة</button>
            <button class="btn btn-danger full-width" onclick="resetApp()" style="margin-top: 10px; background-color: transparent; color: var(--apple-red); border: 1px solid var(--apple-red);">حذف النظام والبدء من الصفر</button>
        </section>

        <!-- روزنامة الجدول الحالي -->
        <section id="table-section" class="full-page-modal hidden">
            <div class="table-header-controls">
                <h2>سجل الأيام الحالي</h2>
                <button class="btn-close" onclick="toggleTable()">إغلاق</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <!-- قسم المشتريات السابقة -->
        <section id="history-section" class="full-page-modal hidden">
            <div class="table-header-controls">
                <h2>المشتريات السابقة</h2>
                <button class="btn-close" onclick="toggleHistorySection()">إغلاق</button>
            </div>
            <div id="history-list" class="history-list">
                <!-- سيتم توليد الجداول السابقة هنا -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
