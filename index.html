<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق إدارة الخبز</title>
    <link rel="stylesheet" href="style.css">
    <!-- استخدام خط مشابه لخطوط أبل -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- شاشة إعداد الجدول الجديد (تظهر إذا لم يكن هناك جدول) -->
        <section id="setup-section" class="card hidden">
            <h2>إعداد جدول جديد</h2>
            <div class="input-group">
                <label>تاريخ البداية:</label>
                <input type="date" id="start-date">
            </div>
            <div class="input-group">
                <label>تاريخ النهاية:</label>
                <input type="date" id="end-date">
            </div>
            <div class="input-group">
                <label>العدد الكلي للخبز للشهر:</label>
                <input type="number" id="total-bread-input" placeholder="مثال: 350">
            </div>
            <button class="btn btn-primary" onclick="createNewSchedule()">بدء الجدول</button>
        </section>

        <!-- الواجهة الرئيسية للتطبيق -->
        <section id="main-dashboard" class="hidden">
            <!-- الترويسة والتاريخ -->
            <header class="header-date">
                <h1 id="today-day-name">اليوم</h1>
                <p id="today-full-date">التاريخ</p>
            </header>

            <!-- الإحصائيات -->
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-label">المتبقي</span>
                    <span class="stat-value" id="remaining-bread">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">العدد الكلي</span>
                    <span class="stat-value text-blue" id="total-bread">0</span>
                </div>
            </div>

            <!-- حالة الاشتراك (الفلوس والطحين) -->
            <div class="card status-card">
                <div class="toggle-row">
                    <span class="toggle-label" id="money-label">فلوس الاشتراك (غير واصل)</span>
                    <label class="switch">
                        <input type="checkbox" id="money-toggle" onchange="updateSubscription()">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="divider"></div>
                <div class="toggle-row">
                    <span class="toggle-label" id="flour-label">الطحين (غير واصل)</span>
                    <label class="switch">
                        <input type="checkbox" id="flour-toggle" onchange="updateSubscription()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- تحذير الأيام المنسية / السابقة -->
            <div id="missing-days-warning" class="warning-banner hidden">
                ⚠️ تنبيه: أنت تقوم الآن بتسجيل يوم فائت!
            </div>

            <!-- إدخال بيانات اليوم -->
            <div class="card action-card">
                <h3 id="record-card-title">تسجيل خبز اليوم</h3>
                <div class="input-row">
                    <input type="number" id="daily-amount" placeholder="عدد الخبز">
                    <select id="daily-meal">
                        <option value="غداء">غداء</option>
                        <option value="عشاء">عشاء</option>
                        <option value="غداء وعشاء">غداء وعشاء</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="recordToday(true)">تسجيل العدد</button>
                    <button class="btn btn-warning" onclick="recordToday(false)">لم أشتري (فارغ)</button>
                </div>
            </div>

            <!-- زر عرض الجدول والتعديل -->
            <button class="btn btn-secondary full-width" onclick="toggleTable()">عرض وتعديل الجدول</button>
            <button class="btn btn-danger full-width" onclick="resetApp()" style="margin-top: 10px; background-color: transparent; color: var(--apple-red); border: 1px solid var(--apple-red);">حذف الجدول الحالي والبدء من جديد</button>
        </section>

        <!-- روزنامة الجدول -->
        <section id="table-section" class="hidden">
            <div class="table-header-controls">
                <h2>سجل الأيام</h2>
                <button class="btn-close" onclick="toggleTable()">إغلاق</button>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- سيتم توليد الأيام هنا برمجياً -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
